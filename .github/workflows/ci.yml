name: CI

permissions:
  contents: read

# Triggers:
#   - push: main — every accepted commit revalidates on the merged SHA.
#     This fork has no nightly workflow that re-runs CI on main, so the
#     push trigger is the only post-merge signal that the tree stays
#     green (e.g. after a merge conflict resolution, a hot-fix pushed
#     directly to main, or a Dependabot bump auto-merged via squash).
#   - pull_request: gate every PR against main before merge.
#   - workflow_dispatch: manual revalidation.
#   - workflow_call: invoked by other workflows if/when run-all lands.
#
# The shared `ci-${{ github.ref }}` concurrency group keeps PR + push
# runs from racing. Tag pushes are owned end-to-end by release.yml.
on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test + format + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install root dependencies
        run: npm install --no-audit --no-fund

      - name: Install server dependencies
        run: cd app/server && npm install --no-audit --no-fund

      - name: Install client dependencies
        run: cd app/client && npm install --no-audit --no-fund

      - name: Run tests (scripts + server + client)
        run: npm test

      # `npm run fmt` writes formatted output; CI re-runs prettier with
      # `--check` against the same globs so a PR with unformatted code
      # fails before merge instead of silently being reformatted later.
      - name: Check formatting
        run: |
          npx prettier --check \
            'app/server/src/**/*.ts' \
            'app/client/src/**/*.{ts,tsx}' \
            'hooks/scripts/**/*.mjs' \
            'test/**/*.mjs' \
            'start.mjs'

      - name: Build client bundle
        run: cd app/client && npm run build
