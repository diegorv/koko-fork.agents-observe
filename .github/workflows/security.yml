name: Security

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 9:00 UTC
  workflow_dispatch:
  # Reusable: invoked by run-all.yml.
  workflow_call:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  npm-audit:
    name: npm Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      # Run audit in each workspace that owns its own lockfile. The root
      # has no lockfile (its deps are dev-only and installed ad hoc), so
      # auditing root would only flag the transitive surface of the dev
      # tooling — `npm install` in CI is the right place to catch that.
      - name: Audit server dependencies
        run: cd app/server && npm audit --audit-level=moderate

      - name: Audit client dependencies
        run: cd app/client && npm audit --audit-level=moderate

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - name: Review dependencies
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate
